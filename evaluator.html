<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>평가원 대시보드 | 동물복지인증 평가 시스템</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="auth.js"></script>
</head>
<body>
    <div class="dashboard-layout">
        <!-- 사이드바 오버레이 -->
        <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

        <!-- 사이드바 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>농림축산식품부</h2>
                <p style="font-size: 0.8rem; color: #666;">동물복지인증 시스템</p>
            </div>
            <ul class="nav-menu">
                <li class="nav-item">
                    <a href="#" class="nav-link active" onclick="showTab('assigned')"><i class="fas fa-calendar-check"></i> 배정목록</a>
                </li>
                <li class="nav-item">
                    <a href="#" class="nav-link" onclick="showTab('report')"><i class="fas fa-file-invoice"></i> 인증심사</a>
                </li>
                <li class="nav-item">
                    <a href="#" class="nav-link" onclick="showTab('history')"><i class="fas fa-archive"></i> 심사이력</a>
                </li>
            </ul>
            <div class="user-profile" style="margin-top: auto; padding-top: 20px; border-top: 1px solid #eee;">
                <p id="userNameDisplay" style="font-weight: 500;"></p>
                <p style="font-size: 0.8rem; color: #666;">전문 평가원</p>
            </div>
        </aside>

        <!-- 메인 콘텐츠 -->
        <main class="main-content">
            <header class="header">
                <div style="display: flex; align-items: center; gap: 15px;">
                    <button class="mobile-menu-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
                    <h1 id="pageTitle">평가자 대시보드</h1>
                </div>
                <div class="user-info">
                    <button class="logout-btn" onclick="window.auth.logout()">로그아웃</button>
                </div>
            </header>

            <!-- 배정된 평가 목록 탭 -->
            <div id="assignedTab" class="tab-content">
                <section class="card" style="margin-bottom: 25px; border-left: 5px solid var(--accent-color);">
                    <h3><i class="fas fa-exclamation-triangle"></i> 금주 예정 현장평가</h3>
                    <p style="margin-top: 10px;">총 <strong id="assignedCount">0건</strong>의 현장 방문 평가가 예정되어 있습니다.</p>
                </section>
 
                <section class="mt-20">
                    <div class="card" style="width: 100%;">
                        <h3><i class="fas fa-clipboard-list"></i> 진행 중인 평가 작업</h3>
                        <div class="table-responsive">
                            <table class="data-table">
                                <thead>
                                    <tr>
                                        <th>대상 농장</th>
                                        <th>소재지</th>
                                        <th>평가 유형</th>
                                        <th>평가 일시</th>
                                        <th>상태</th>
                                        <th>작업</th>
                                    </tr>
                                </thead>
                                <tbody id="assignedList">
                                    <!-- JS로 동적 생성 -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </section>
            </div>

            <!-- 평가 보고서 작성 탭 -->
            <div id="reportTab" class="tab-content" style="display: none;">
                <section class="card">
                    <div id="reportStep1">
                        <h3><i class="fas fa-file-invoice"></i> 신규 인증심사 시작</h3>
                        <div class="form-group" style="margin-top: 20px; max-width: 400px;">
                            <label>평가 대상 농장 선택</label>
                            <select id="targetFarm" style="width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: 6px; margin-top: 10px;">
                                <option value="">농장을 선택하세요</option>
                            </select>
                        </div>
                        <button class="btn-primary" style="margin-top: 20px;" onclick="startOfficialEvaluation()">평가 시작하기</button>
                    </div>

                    <div id="reportStep2" style="display: none;">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 2px solid #eee;">
                            <h3 id="currentFarmName">농장명</h3>
                            <button class="logout-btn" onclick="cancelEvaluation()">취소</button>
                        </div>
                        
                        <div id="officialEvalItemsContainer">
                            <!-- 평가항목 및 위저드 네비게이션이 동적으로 생성됨 -->
                        </div>
                    </div>
                </section>
            </div>

            <!-- 과거 평가 이력 탭 -->
            <div id="historyTab" class="tab-content" style="display: none;">
                <section class="card">
                    <h3><i class="fas fa-archive"></i> 완료된 심사이력 목록</h3>

                    <!-- 검색 필터 영역 추가 -->
                    <div style="background: #f8fafc; padding: 15px; border-radius: 8px; margin-top: 15px; margin-bottom: 20px; border: 1px solid #e2e8f0; display: flex; gap: 15px; align-items: center; flex-wrap: wrap;">
                        <div style="display: flex; align-items: center; gap: 8px;">
                            <label style="font-weight: 500; font-size: 0.9rem;">제출 연도:</label>
                            <select id="searchYear" style="padding: 8px; border: 1px solid var(--border-color); border-radius: 6px; font-size: 0.9rem;">
                                <option value="">전체 연도</option>
                            </select>
                        </div>
                        <div style="display: flex; align-items: center; gap: 8px;">
                            <label style="font-weight: 500; font-size: 0.9rem;">농장명:</label>
                            <select id="searchFarm" style="padding: 8px; border: 1px solid var(--border-color); border-radius: 6px; font-size: 0.9rem;">
                                <option value="">전체 농장</option>
                            </select>
                        </div>
                        <div style="display: flex; align-items: center; gap: 8px;">
                            <label style="font-weight: 500; font-size: 0.9rem;">농장주명:</label>
                            <select id="searchOwner" style="padding: 8px; border: 1px solid var(--border-color); border-radius: 6px; font-size: 0.9rem;">
                                <option value="">전체 농장주</option>
                            </select>
                        </div>
                        <div style="display: flex; align-items: center; gap: 8px;">
                            <label style="font-weight: 500; font-size: 0.9rem;">상태:</label>
                            <select id="searchStatus" style="padding: 8px; border: 1px solid var(--border-color); border-radius: 6px; font-size: 0.9rem;">
                                <option value="">전체 상태</option>
                                <option value="제출완료">제출완료</option>
                            </select>
                        </div>
                        <button class="btn-primary" style="padding: 8px 20px; margin-left: auto;" onclick="filterHistory()"><i class="fas fa-search"></i> 검색</button>
                    </div>
                    <div class="table-responsive">
                        <table class="data-table mt-20">
                            <thead>
                                <tr>
                                    <th>제출 일시</th>
                                    <th>대상 농장</th>
                                    <th>점수</th>
                                    <th>상태</th>
                                    <th>작업</th>
                                </tr>
                            </thead>
                            <tbody id="officialHistoryList">
                                <!-- 데이터 로드 -->
                            </tbody>
                        </table>
                    </div>
                </section>
            </div>


        </main>
    </div>

    <script>
        // 페이지 로드 시 권한 체크 및 초기화
        document.addEventListener('DOMContentLoaded', () => {
            window.auth.checkAuth('evaluator');
            const userName = localStorage.getItem('user_name') || localStorage.getItem('user_id') || '평가원';
            document.getElementById('userNameDisplay').innerText = userName + '님';
            
            // 초기 탭 활성화
            showTab('assigned');
        });
        const db = window.auth.supabase;

        // 평가 상태를 저장할 전역 변수들
        let evaluationItems = [];      // 모든 평가 항목 원본 데이터
        let largeItemGroups = [];      // 대항목으로 그룹화된 데이터
        let currentGroupIndex = 0;     // 현재 표시 중인 대항목 그룹의 인덱스

        // 사이드바 토글
        function toggleSidebar() {
            document.querySelector('.sidebar').classList.toggle('active');
            document.getElementById('sidebarOverlay').classList.toggle('active');
        }

        function showTab(tabName) {
            console.log('Showing tab:', tabName);
            // 모바일에서 탭 클릭 시 사이드바 닫기
            if (window.innerWidth <= 1024) {
                document.querySelector('.sidebar').classList.remove('active');
                document.getElementById('sidebarOverlay').classList.remove('active');
            }

            // 모든 탭 숨기기
            document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
            
            // 대상 탭 표시
            const targetTab = document.getElementById(tabName + 'Tab');
            if (targetTab) {
                targetTab.style.display = 'block';
            } else {
                console.error('Tab not found:', tabName + 'Tab');
            }
            
            // 사이드바 메뉴 활성화 상태 변경
            document.querySelectorAll('.nav-link').forEach(link => {
                link.classList.remove('active');
                const onclickAttr = link.getAttribute('onclick');
                if (onclickAttr && onclickAttr.includes(`'${tabName}'`)) {
                    link.classList.add('active');
                }
            });

            // 페이지 타이틀 변경 및 데이터 로드
            const titleMap = {
                'assigned': '배정목록',
                'report': '인증심사',
                'history': '심사이력'
            };
            
            if (document.getElementById('pageTitle')) {
                document.getElementById('pageTitle').innerText = titleMap[tabName] || '평가자 대시보드';
            }

            if (tabName === 'assigned') {
                loadAssignedFarms();
            } else if (tabName === 'report') {
                loadFarms();
            } else if (tabName === 'history') {
                loadOfficialHistory();
            }
        }

        // 배정된 평가 목록 동적 로드
        async function loadAssignedFarms() {
            try {
                // 모든 농장 정보 가져오기
                const { data: farms, error: farmsError } = await db.from('farms').select('*');
                if (farmsError) throw farmsError;

                // 이미 완료된 평가 보고서 목록 가져오기 (실시간 완료 필터링용)
                const { data: reports, error: reportsError } = await db.from('evaluation_reports').select('farm_id');
                if (reportsError) throw reportsError;

                const completedFarmIds = new Set(reports.map(r => r.farm_id));

                // 관리자가 '평가일시'를 지정하고 아직 평가를 완료하지 않은 농장들 필터링
                const assignedFarms = farms.filter(farm => {
                    let remarksData = { notes: '', audit_type: '', eval_date: '' };
                    try {
                        if (farm.remarks && farm.remarks.trim().startsWith('{')) {
                            remarksData = JSON.parse(farm.remarks);
                        }
                    } catch (e) {}

                    // 평가일시(eval_date)가 설정되어 있고 아직 평가 완료되지 않은 건
                    return remarksData.eval_date && !completedFarmIds.has(farm.id);
                });

                const countEl = document.getElementById('assignedCount');
                if (countEl) {
                    countEl.innerText = `${assignedFarms.length}건`;
                }

                const tbody = document.getElementById('assignedList');
                if (!tbody) return;

                if (assignedFarms.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; padding: 20px;">배정된 평가가 없습니다.</td></tr>';
                    return;
                }

                tbody.innerHTML = assignedFarms.map(farm => {
                    let remarksData = { notes: '', audit_type: '', eval_date: '' };
                    try {
                        if (farm.remarks && farm.remarks.trim().startsWith('{')) {
                            remarksData = JSON.parse(farm.remarks);
                        }
                    } catch (e) {}

                    const auditType = remarksData.audit_type || '신규';
                    let evalDateStr = '-';
                    if (remarksData.eval_date) {
                        const d = new Date(remarksData.eval_date);
                        evalDateStr = isNaN(d.getTime()) ? remarksData.eval_date : d.toLocaleString();
                    }

                    return `
                        <tr>
                            <td style="font-weight: 500;">${farm.name}</td>
                            <td>${farm.address}</td>
                            <td><span class="status-badge status-process" style="font-size: 0.75rem;">${auditType}</span></td>
                            <td>${evalDateStr}</td>
                            <td><span class="status-badge status-pending">방문 예정</span></td>
                            <td><button class="btn-primary" style="padding: 5px 10px; font-size: 0.8rem;" onclick="startAssignedEvaluation(${farm.id})">보고서 작성</button></td>
                        </tr>
                    `;
                }).join('');

            } catch (err) {
                console.error('Error loading assigned farms:', err);
            }
        }

        // 배정된 목록에서 바로 보고서 작성 페이지로 이동하여 평가를 시작하는 함수
        function startAssignedEvaluation(farmId) {
            showTab('report');
            const select = document.getElementById('targetFarm');
            if (select) {
                select.value = farmId;
                startOfficialEvaluation();
            }
        }

        async function loadFarms() {
            try {
                const { data, error } = await db.from('farms').select('*');
                if (error) throw error;
                
                const select = document.getElementById('targetFarm');
                if (select) {
                    select.innerHTML = '<option value="">농장을 선택하세요</option>' + 
                        data.map(f => `<option value="${f.id}">${f.name} (${f.representative || f.owner || ''})</option>`).join('');
                }
                
                if (document.getElementById('reportStep1')) document.getElementById('reportStep1').style.display = 'block';
                if (document.getElementById('reportStep2')) document.getElementById('reportStep2').style.display = 'none';
            } catch (err) {
                console.error('Error loading farms:', err);
            }
        }

        // 임시 저장 기능
        function saveDraft() {
            const farmId = document.getElementById('targetFarm').value;
            const evaluatorId = localStorage.getItem('user_id');
            if (!farmId || !evaluatorId) return;

            const draftData = {
                currentGroupIndex: currentGroupIndex,
                overallSummaryValue: window.overallSummaryValue || "",
                items: evaluationItems.map(item => ({
                    id: item.id,
                    eval_value: item.eval_value,
                    eval_comment: item.eval_comment
                }))
            };

            localStorage.setItem(`temp_eval_${evaluatorId}_${farmId}`, JSON.stringify(draftData));
            alert('작성 중인 평가 보고서가 임시 저장되었습니다.');
        }

        // 임시 저장 삭제 기능
        function clearDraft() {
            const farmId = document.getElementById('targetFarm').value;
            const evaluatorId = localStorage.getItem('user_id');
            if (farmId && evaluatorId) {
                localStorage.removeItem(`temp_eval_${evaluatorId}_${farmId}`);
            }
        }

        // 공식 평가 프로세스 시작 및 대항목 위저드 구성
        async function startOfficialEvaluation() {
            const farmId = document.getElementById('targetFarm').value;
            if (!farmId) return alert('농장을 선택해 주세요.');

            const farmSelect = document.getElementById('targetFarm');
            const farmName = farmSelect.options[farmSelect.selectedIndex].text;
            document.getElementById('currentFarmName').innerText = '평가 대상: ' + farmName;
            
            document.getElementById('reportStep1').style.display = 'none';
            document.getElementById('reportStep2').style.display = 'block';

            try {
                const { data, error } = await db.from('evaluation_items').select('*').order('id', { ascending: true });
                if (error) throw error;

                // 1. 메모리 데이터 초기화 (라디오 버튼 및 의견 필드 백업용)
                evaluationItems = data.map(item => ({
                    ...item,
                    eval_value: null,
                    eval_comment: ""
                }));

                // 임시 저장 불러오기 체크
                const evaluatorId = localStorage.getItem('user_id');
                const draftKey = `temp_eval_${evaluatorId}_${farmId}`;
                const savedDraft = localStorage.getItem(draftKey);
                
                let loadedFromDraft = false;
                if (savedDraft) {
                    if (confirm('이 농장에 대해 임시 저장된 평가 내역이 있습니다. 불러오시겠습니까?')) {
                        const draftData = JSON.parse(savedDraft);
                        currentGroupIndex = draftData.currentGroupIndex || 0;
                        window.overallSummaryValue = draftData.overallSummaryValue || "";
                        
                        // 임시 저장 데이터 복원
                        draftData.items.forEach(dItem => {
                            const match = evaluationItems.find(i => i.id === dItem.id);
                            if (match) {
                                match.eval_value = dItem.eval_value;
                                match.eval_comment = dItem.eval_comment;
                            }
                        });
                        loadedFromDraft = true;
                    }
                }

                // 2. 대항목(large_item) 기준으로 그룹 생성 (순서 보장)
                largeItemGroups = [];
                let currentGroup = null;

                evaluationItems.forEach(item => {
                    if (!currentGroup || currentGroup.largeItem !== item.large_item || currentGroup.section !== item.section) {
                        currentGroup = {
                            section: item.section,
                            largeItem: item.large_item,
                            items: []
                        };
                        largeItemGroups.push(currentGroup);
                    }
                    currentGroup.items.push(item);
                });

                if (!loadedFromDraft) {
                    currentGroupIndex = 0;
                    window.overallSummaryValue = ""; // 종합 의견 초기화
                }
                
                // 3. 첫 번째/불러온 대항목 화면 렌더링
                renderCurrentGroup();

            } catch (err) {
                console.error('Error starting evaluation:', err);
                alert('평가 항목을 불러오는 중 오류가 발생했습니다.');
            }
        }

        // 적합 기준 텍스트를 파싱하여 라디오 버튼 옵션 배열로 반환하는 함수
        function parseOptions(criteriaText) {
            if (!criteriaText || criteriaText.trim() === "") {
                return [
                    { value: "Y", label: "Y: 적합" },
                    { value: "N", label: "N: 부적합" }
                ];
            }
            const lines = criteriaText.split('\n');
            const options = [];
            lines.forEach(line => {
                const trimmed = line.trim();
                if (!trimmed) return;
                
                const colonIndex = trimmed.indexOf(':');
                if (colonIndex > 0) {
                    const val = trimmed.substring(0, colonIndex).trim();
                    const desc = trimmed.substring(colonIndex + 1).trim();
                    options.push({ value: val, label: `${val}: ${desc}` });
                } else {
                    options.push({ value: trimmed, label: trimmed });
                }
            });
            return options;
        }

        // 현재 선택된 대항목 페이지를 렌더링
        function renderCurrentGroup() {
            const container = document.getElementById('officialEvalItemsContainer');
            if (largeItemGroups.length === 0) return;

            // 1. 마지막 페이지: 종합 의견 작성 및 제출 화면
            if (currentGroupIndex === largeItemGroups.length) {
                const progressHtml = `
                    <div style="font-size: 0.9rem; color: var(--text-muted); margin-bottom: 10px; font-weight: 500;">
                        진행 상황: 완료 단계 (종합 평가 의견 작성)
                    </div>
                    <div style="width: 100%; height: 6px; background: #e2e8f0; border-radius: 3px; margin-bottom: 25px; overflow: hidden;">
                        <div style="width: 100%; height: 100%; background: #2c7a7b; border-radius: 3px;"></div>
                    </div>
                `;

                const summaryHtml = `
                    <div class="card" style="background: #fffaf0; padding: 25px; border: 1px solid #fbd38d; margin-bottom: 25px;">
                        <h4 style="color: #dd6b20; font-size: 1.1rem; display: flex; align-items: center; gap: 10px; margin-bottom: 15px;">
                            <i class="fas fa-pen-nib"></i> 종합 평가 의견
                        </h4>
                        <p style="font-size: 0.9rem; color: var(--text-muted); margin-bottom: 15px;">농장의 전반적인 동물복지 상태 및 개선 권고 사항에 대한 의견을 최종 작성해 주세요.</p>
                        <textarea id="overallSummary" style="width: 100%; height: 150px; padding: 12px; border: 1px solid var(--border-color); border-radius: 6px; font-size: 0.95rem; line-height: 1.5;" placeholder="의견을 서술식으로 작성하세요."></textarea>
                    </div>
                `;

                const navigationHtml = `
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 30px;">
                        <button class="logout-btn" style="padding: 12px 30px; font-weight: 500;" onclick="prevGroup()">
                            <i class="fas fa-arrow-left"></i> 이전 대항목
                        </button>
                        <button class="btn-primary" style="padding: 12px 25px; background: #4a5568; font-weight: 500;" onclick="saveDraft()">
                            <i class="fas fa-save"></i> 임시 저장
                        </button>
                        <button class="btn-primary" style="padding: 12px 40px; font-weight: 700; background: #2c7a7b;" onclick="submitOfficialEvaluation()">
                            평가 보고서 최종 제출 <i class="fas fa-check-double"></i>
                        </button>
                    </div>
                `;

                container.innerHTML = progressHtml + summaryHtml + navigationHtml;

                // 기존 작성 데이터가 있는 경우 텍스트 반영
                const summaryTextarea = document.getElementById('overallSummary');
                if (summaryTextarea && window.overallSummaryValue) {
                    summaryTextarea.value = window.overallSummaryValue;
                }

                // 종합의견 입력 시 전역 상태에 임시 저장
                if (summaryTextarea) {
                    summaryTextarea.addEventListener('input', (e) => {
                        window.overallSummaryValue = e.target.value;
                    });
                }
                return;
            }

            // 2. 대항목 평가 페이지
            const group = largeItemGroups[currentGroupIndex];
            
            const progressHtml = `
                <div style="font-size: 0.9rem; color: var(--text-muted); margin-bottom: 10px; font-weight: 500;">
                    진행 상태: ${currentGroupIndex + 1} / ${largeItemGroups.length} 페이지
                </div>
                <div style="width: 100%; height: 6px; background: #e2e8f0; border-radius: 3px; margin-bottom: 25px; overflow: hidden;">
                    <div style="width: ${((currentGroupIndex) / largeItemGroups.length) * 100}%; height: 100%; background: var(--primary-color); transition: width 0.3s;"></div>
                </div>
            `;

            const itemsHtml = `
                <div class="section-group" style="margin-bottom: 20px;">
                    <h4 style="background: #f8fafc; padding: 12px 20px; border-left: 5px solid var(--primary-color); margin-bottom: 15px; font-size: 1.1rem;">
                        ${group.section} &gt; ${group.largeItem}
                    </h4>
                    ${group.items.map(item => {
                        const options = parseOptions(item.compliance_criteria);
                        // 섹션 이름에 괄호 '('와 ')'가 포함되어 있는지 확인 (예: □ 사향관리 방법(송아지), □ *(*))
                        const hasParentheses = item.section && item.section.includes('(') && item.section.includes(')');
                        return `
                        <div class="card" style="margin-bottom: 15px; padding: 20px; border: 1px solid #edf2f7;">
                            <div class="eval-item-row">
                                <div class="eval-item-left">
                                    <div style="font-weight: 700; color: #2d3748; margin-bottom: 5px;">${item.small_item || item.large_item}</div>
                                    <div style="font-size: 0.9rem; color: #4a5568; margin-bottom: 10px;">${item.standard}</div>
                                </div>
                                <div class="eval-item-right" style="flex: 1; max-width: 450px;">
                                    <div class="eval-item-options" style="display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px; background: #fff; padding: 10px; border-radius: 6px; border: 1px solid #edf2f7;">
                                        ${options.map(opt => `
                                            <label style="cursor: pointer; display: flex; align-items: flex-start; gap: 8px; font-size: 0.9rem; color: #4a5568;">
                                                <input type="radio" name="off_item_${item.id}" value="${opt.value}" required 
                                                    ${item.eval_value === opt.value ? 'checked' : ''} 
                                                    onchange="saveItemValue(${item.id}, '${opt.value}')" style="margin-top: 4px;"> 
                                                <span>${opt.label}</span>
                                            </label>
                                        `).join('')}
                                        ${hasParentheses ? `
                                            <label style="cursor: pointer; display: flex; align-items: flex-start; gap: 8px; font-size: 0.9rem; color: #718096; font-weight: 500; border-top: 1px dashed #e2e8f0; padding-top: 8px; margin-top: 4px;">
                                                <input type="radio" name="off_item_${item.id}" value="N/A" 
                                                    ${item.eval_value === 'N/A' || item.eval_value === null ? 'checked' : ''} 
                                                    onchange="saveItemValue(${item.id}, 'N/A')" style="margin-top: 4px;"> 
                                                <span>해당사항없음 (평가 생략)</span>
                                            </label>
                                        ` : ''}
                                    </div>
                                    <input type="text" id="off_comm_${item.id}" placeholder="평가 의견 입력" 
                                        value="${item.eval_comment || ''}" 
                                        oninput="saveItemComment(${item.id}, this.value)" 
                                        style="width: 100%; padding: 8px; border: 1px solid #eee; font-size: 0.85rem; border-radius: 4px;">
                                </div>
                            </div>
                        </div>
                        `;
                    }).join('')}
                </div>
            `;

            const navigationHtml = `
                <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 30px;">
                    <div>
                        ${currentGroupIndex > 0 ? `
                            <button class="logout-btn" style="padding: 12px 30px; font-weight: 500;" onclick="prevGroup()">
                                <i class="fas fa-arrow-left"></i> 이전 대항목
                            </button>
                        ` : ''}
                    </div>
                    <div>
                        <button class="btn-primary" style="padding: 12px 25px; background: #4a5568; font-weight: 500;" onclick="saveDraft()">
                            <i class="fas fa-save"></i> 임시 저장
                        </button>
                    </div>
                    <div>
                        <button class="btn-primary" style="padding: 12px 40px; font-weight: 500;" onclick="nextGroup()">
                            다음 <i class="fas fa-arrow-right"></i>
                        </button>
                    </div>
                </div>
            `;

            container.innerHTML = progressHtml + itemsHtml + navigationHtml;
        }

        // 라디오 버튼 선택 시 메모리 업데이트
        function saveItemValue(id, value) {
            const item = evaluationItems.find(i => i.id === id);
            if (item) {
                item.eval_value = value;
            }
        }

        // 평가의견 작성 시 메모리 업데이트
        function saveItemComment(id, comment) {
            const item = evaluationItems.find(i => i.id === id);
            if (item) {
                item.eval_comment = comment;
            }
        }

        // 이전 페이지로 이동
        function prevGroup() {
            if (currentGroupIndex > 0) {
                currentGroupIndex--;
                renderCurrentGroup();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        // 다음 페이지로 이동 (검증 포함)
        function nextGroup() {
            const group = largeItemGroups[currentGroupIndex];
            // section 이름이나 대항목 명칭에 '(추가 사항)'이 들어간 항목은 제외하고 미입력 건 필터링
            const uncompleted = group.items.filter(i => {
                const isOptional = (i.section && i.section.includes('(추가 사항)')) || (i.large_item && i.large_item.includes('(추가 사항)'));
                return i.eval_value === null && !isOptional;
            });

            if (uncompleted.length > 0) {
                alert('현재 대항목의 필수 평가 항목을 모두 입력해 주세요.');
                return;
            }

            if (currentGroupIndex < largeItemGroups.length) {
                currentGroupIndex++;
                renderCurrentGroup();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        // 최종 보고서 제출 처리
        async function submitOfficialEvaluation() {
            const farmId = document.getElementById('targetFarm').value;
            const evaluatorId = localStorage.getItem('user_id');
            const summary = window.overallSummaryValue || "";

            // 미해결 문항 재검증 (추가 사항 항목은 필수 검증에서 제외)
            const uncompletedItems = evaluationItems.filter(i => {
                const isOptional = (i.section && i.section.includes('(추가 사항)')) || (i.large_item && i.large_item.includes('(추가 사항)'));
                return i.eval_value === null && !isOptional;
            });
            if (uncompletedItems.length > 0) {
                const uncompletedNames = [...new Set(uncompletedItems.map(i => i.large_item))];
                alert(`아직 평가되지 않은 필수 문항이 존재합니다.\n대항목: ${uncompletedNames.join(', ')}`);
                return;
            }

            let earnedPoints = 0;
            let maxPoints = 0;
            let details = {};

            evaluationItems.forEach(item => {
                details[item.id] = { status: item.eval_value, comment: item.eval_comment };
                
                // 만약 평가자가 값을 선택하지 않고 생략했거나 'N/A'(해당사항없음)를 체크했다면 점수 계산에서 아예 제외
                if (item.eval_value === null || item.eval_value === 'N/A') {
                    return;
                }
                
                const options = parseOptions(item.compliance_criteria);
                const numericValues = options.map(o => parseFloat(o.value)).filter(v => !isNaN(v));
                
                if (numericValues.length > 0) {
                    // 점수형 문항
                    const maxVal = Math.max(...numericValues);
                    let earnedVal = parseFloat(item.eval_value);
                    if (isNaN(earnedVal)) {
                        // N 등 숫자가 아닌 경우 0점으로 취급
                        earnedVal = 0;
                    }
                    earnedPoints += earnedVal;
                    maxPoints += maxVal;
                } else {
                    // 적부(Y/N)형 문항
                    if (item.eval_value === 'Y') {
                        earnedPoints += 1;
                        maxPoints += 1;
                    } else if (item.eval_value === 'N') {
                        maxPoints += 1;
                    }
                    // NA 등은 점수 분모/분자에서 제외
                }
            });

            const score = maxPoints > 0 ? Math.round((earnedPoints / maxPoints) * 100) : 0;

            try {
                const { error } = await db.from('evaluation_reports').insert({
                    farm_id: farmId,
                    evaluator_id: evaluatorId,
                    score: score,
                    summary: summary,
                    details: details
                });

                if (error) throw error;

                alert('평가 보고서가 성공적으로 제출되었습니다.');
                
                // 임시 저장 데이터 제거
                clearDraft();
                
                // 데이터 초기화
                window.overallSummaryValue = "";
                evaluationItems = [];
                largeItemGroups = [];
                currentGroupIndex = 0;

                showTab('assigned');
            } catch (err) {
                console.error('Error submitting evaluation:', err);
                alert('보고서 제출 중 오류가 발생했습니다.');
            }
        }

        async function loadOfficialHistory() {
            try {
                // 대표자(농장주명)도 필터하기 위해 representative 포함 조회
                const { data, error } = await db.from('evaluation_reports').select('*, farms(name, representative)').order('created_at', { ascending: false });
                if (error) throw error;

                // 전역에 이력 보관
                window.allHistoryReports = data;

                // 1. 제출 연도 추출 및 드롭다운 바인딩
                const years = [...new Set(data.map(report => {
                    if (!report.created_at) return null;
                    return new Date(report.created_at).getFullYear();
                }).filter(y => y !== null))].sort((a, b) => b - a);

                const yearSelect = document.getElementById('searchYear');
                if (yearSelect) {
                    const currentVal = yearSelect.value;
                    yearSelect.innerHTML = '<option value="">전체 연도</option>' + 
                        years.map(y => `<option value="${y}">${y}년</option>`).join('');
                    yearSelect.value = currentVal;
                }

                // 2. 고유 농장명 추출 및 드롭다운 바인딩
                const farmNames = [...new Set(data.map(r => r.farms ? r.farms.name : '').filter(name => name !== ''))].sort();
                const farmSelect = document.getElementById('searchFarm');
                if (farmSelect) {
                    const currentVal = farmSelect.value;
                    farmSelect.innerHTML = '<option value="">전체 농장</option>' + 
                        farmNames.map(name => `<option value="${name}">${name}</option>`).join('');
                    farmSelect.value = currentVal;
                }

                // 3. 고유 농장주명(대표자) 추출 및 드롭다운 바인딩
                const owners = [...new Set(data.map(r => r.farms ? r.farms.representative : '').filter(rep => rep !== ''))].sort();
                const ownerSelect = document.getElementById('searchOwner');
                if (ownerSelect) {
                    const currentVal = ownerSelect.value;
                    ownerSelect.innerHTML = '<option value="">전체 농장주</option>' + 
                        owners.map(owner => `<option value="${owner}">${owner}</option>`).join('');
                    ownerSelect.value = currentVal;
                }

                filterHistory();
            } catch (err) {
                console.error('Error loading history:', err);
            }
        }

        // 심사이력 필터링 및 렌더링
        function filterHistory() {
            if (!window.allHistoryReports) return;

            const targetYear = document.getElementById('searchYear').value;
            const targetFarm = document.getElementById('searchFarm').value;
            const targetOwner = document.getElementById('searchOwner').value;
            const targetStatus = document.getElementById('searchStatus').value;

            const filtered = window.allHistoryReports.filter(report => {
                // 1. 연도 필터링
                if (targetYear) {
                    if (!report.created_at) return false;
                    const reportYear = String(new Date(report.created_at).getFullYear());
                    if (reportYear !== targetYear) return false;
                }

                // 2. 농장명 필터링
                if (targetFarm) {
                    const farmName = report.farms ? report.farms.name : '';
                    if (farmName !== targetFarm) return false;
                }

                // 3. 농장주명 필터링
                if (targetOwner) {
                    const ownerName = report.farms ? report.farms.representative : '';
                    if (ownerName !== targetOwner) return false;
                }

                // 4. 상태 필터링
                if (targetStatus) {
                    // 현재 DB에 올라가 있는 모든 보고서는 완료된 건이므로 '제출완료' 고정 매칭
                    const statusText = '제출완료';
                    if (statusText !== targetStatus) return false;
                }

                return true;
            });

            const list = document.getElementById('officialHistoryList');
            if (list) {
                list.innerHTML = filtered.map(item => `
                    <tr>
                        <td>${new Date(item.created_at).toLocaleString()}</td>
                        <td>${item.farms ? item.farms.name : '알수없음'}</td>
                        <td style="font-weight: 700;">${item.score}%</td>
                        <td><span class="status-badge status-completed">제출완료</span></td>
                        <td><button class="logout-btn" style="padding: 4px 8px;" onclick="window.open('diagnosis_report.html?id=${item.id}&type=official', '_blank', 'width=1000,height=800')">보고서</button></td>
                    </tr>
                `).join('') || '<tr><td colspan="5" style="text-align:center; padding:20px;">검색된 심사이력이 없습니다.</td></tr>';
            }
        }

        function cancelEvaluation() {
            if (confirm('평가를 중단하시겠습니까? 입력된 내용은 저장되지 않습니다. (임시 저장된 내용은 유지됩니다.)')) {
                window.overallSummaryValue = "";
                evaluationItems = [];
                largeItemGroups = [];
                currentGroupIndex = 0;
                showTab('report');
            }
        }
    </script>
</body>
</html>
