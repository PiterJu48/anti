<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>자가 진단 결과 보고서 | 동물복지인증 평가 시스템</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="auth.js"></script>
    <style>
        .report-container {
            max-width: 900px;
            margin: 40px auto;
            padding: 40px;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        .report-header {
            text-align: center;
            border-bottom: 2px solid var(--primary-color);
            padding-bottom: 20px;
            margin-bottom: 30px;
        }
        .score-circle {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: var(--primary-color);
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }
        .score-value {
            font-size: 2.5rem;
            font-weight: 800;
        }
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }
        .info-item {
            background: #f8fafc;
            padding: 15px;
            border-radius: 8px;
        }
        .detail-item {
            padding: 15px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .status-y { color: #2c7a7b; font-weight: 700; }
        .status-n { color: #c53030; font-weight: 700; }
        @media print {
            .no-print { display: none; }
            .report-container { box-shadow: none; margin: 0; padding: 20px; }
        }
        @media (max-width: 768px) {
            .report-container { margin: 20px; padding: 20px; }
            .info-grid { grid-template-columns: 1fr; }
            .score-circle { width: 120px; height: 120px; }
            .score-value { font-size: 2rem; }
        }
    </style>
</head>
<body>
    <div class="report-container" style="background: #f8fafc; padding: 25px; border-radius: 20px; max-width: 950px;">
        <div class="report-header" style="border: none; padding: 0; margin-bottom: 25px; text-align: center;">
            <h1 style="font-size: 2.2rem; font-weight: 800; color: #0b4c8c; margin-bottom: 8px; letter-spacing: -1px;">동물복지 자가 진단 결과 보고서</h1>
            <p id="reportDate" style="color: #64748b; font-size: 0.95rem; margin-top: 10px;"></p>
        </div>

        <!-- 3칸 요약 카드 레이아웃 -->
        <div style="display: grid; grid-template-columns: 1.1fr 1.1fr 1.3fr; gap: 20px; margin-bottom: 30px;">
            <!-- 종합 점수 (도넛 게이지) -->
            <div style="background: #ffffff; border: 1px solid #e2e8f0; border-radius: 16px; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02);">
                <div style="font-weight: 700; font-size: 1rem; color: #1e293b; margin-bottom: 12px;">종합 점수</div>
                
                <!-- SVG 도넛 차트 -->
                <div style="position: relative; width: 120px; height: 120px; display: flex; align-items: center; justify-content: center; margin-bottom: 12px;">
                    <svg width="120" height="120" viewBox="0 0 120 120" style="transform: rotate(-90deg);">
                        <!-- 배경 원 -->
                        <circle cx="60" cy="60" r="50" fill="none" stroke="#e2e8f0" stroke-width="10" />
                        <!-- 프로그레스 원 -->
                        <circle id="scoreProgressCircle" cx="60" cy="60" r="50" fill="none" stroke="#0b4c8c" stroke-width="10" 
                                stroke-dasharray="314.16" stroke-dashoffset="314.16" stroke-linecap="round" style="transition: stroke-dashoffset 0.8s ease-out;" />
                    </svg>
                    <div style="position: absolute; display: flex; flex-direction: column; align-items: center;">
                        <span id="circleScorePercent" style="font-size: 1.8rem; font-weight: 800; color: #0b4c8c; line-height: 1;">0%</span>
                        <span id="circleScoreFraction" style="font-size: 0.75rem; color: #64748b; margin-top: 4px;">(0점 / 100점)</span>
                    </div>
                </div>
                
                <!-- 상태 배지 -->
                <div id="scoreLevelBadge" style="background-color: #fef3c7; color: #d97706; padding: 6px 16px; border-radius: 20px; font-weight: 700; font-size: 0.85rem;">보통 수준</div>
            </div>

            <!-- 진단 대상 -->
            <div style="background: #ffffff; border: 1px solid #e2e8f0; border-radius: 16px; padding: 20px; display: flex; flex-direction: column; justify-content: space-between; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02);">
                <div style="font-weight: 700; font-size: 1rem; color: #1e293b; margin-bottom: 12px;">진단 대상</div>
                <div style="display: flex; align-items: center; gap: 15px; flex-grow: 1;">
                    <div style="display: flex; align-items: center; justify-content: center; width: 55px; height: 55px; border-radius: 50%; background-color: #f8fafc; border: 1px solid #cbd5e0; flex-shrink: 0;">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="#475569" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M3 10v11a1 1 0 0 0 1 1h16a1 1 0 0 0 1-1V10" />
                            <path d="M12 2 2 9h20Z" />
                            <path d="M9 22V14a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v8" />
                            <path d="M10 17h4" />
                        </svg>
                    </div>
                    <div style="display: flex; flex-direction: column; gap: 4px; font-size: 0.85rem; color: #475569; line-height: 1.4;">
                        <strong id="targetFarmName" style="font-size: 1.05rem; color: #1e293b;">-</strong>
                        <span id="targetFarmBreedScale">-</span>
                        <span id="targetFarmEmployees">-</span>
                    </div>
                </div>
            </div>

            <!-- 종합 의견 -->
            <div style="background: #ffffff; border: 1px solid #e2e8f0; border-radius: 16px; padding: 20px; display: flex; flex-direction: column; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02);">
                <div style="font-weight: 700; font-size: 1rem; color: #1e293b; margin-bottom: 12px; display: flex; align-items: center; gap: 6px;">
                    <i class="fas fa-comment-dots" style="color: #0b4c8c;"></i> 종합 의견
                </div>
                <div id="res_comment" style="font-size: 0.88rem; color: #475569; line-height: 1.6; flex-grow: 1; display: flex; flex-direction: column; justify-content: center; background-color: #f8fafc; padding: 12px; border-radius: 8px; border-left: 4px solid #0b4c8c;">
                    종합 의견 로딩 중...
                </div>
            </div>
        </div>

        <!-- 주요 진단 결과 (요약) -->
        <div class="card" style="padding: 25px; border-radius: 16px; margin-bottom: 30px; border: 1px solid #e2e8f0; background: #ffffff;">
            <h3 style="margin-top: 0; margin-bottom: 15px; font-size: 1.15rem; color: #0b4c8c; font-weight: 800;">주요 진단 결과 (요약)</h3>
            
            <div class="table-responsive">
                <table class="data-table" style="width: 100%; border-collapse: collapse; text-align: center; font-size: 0.9rem;">
                    <thead>
                        <tr style="background-color: #f8fafc; border-bottom: 2px solid #e2e8f0;">
                            <th style="padding: 12px; font-weight: 700; color: #475569; width: 30%; text-align: center;">평가 항목</th>
                            <th style="padding: 12px; font-weight: 700; color: #475569; text-align: center;">기준 점수</th>
                            <th style="padding: 12px; font-weight: 700; color: #475569; text-align: center;">획득 점수</th>
                            <th style="padding: 12px; font-weight: 700; color: #475569; text-align: center;">부적합 항목 수</th>
                            <th style="padding: 12px; font-weight: 700; color: #475569; text-align: center;">결과</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- 관리·시설 행 -->
                        <tr style="border-bottom: 1px solid #edf2f7;">
                            <td style="padding: 15px 12px; text-align: left; display: flex; align-items: center; gap: 10px; justify-content: center;">
                                <div style="display: flex; align-items: center; justify-content: center; width: 32px; height: 32px; border-radius: 50%; background-color: #f0fdf4; border: 1px solid #bbf7d0;">
                                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="#16a34a" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M3 10v11a1 1 0 0 0 1 1h16a1 1 0 0 0 1-1V10" />
                                        <path d="M12 2 2 9h20Z" />
                                        <path d="M9 22V14a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v8" />
                                        <path d="M10 17h4" />
                                    </svg>
                                </div>
                                <div style="text-align: left;">
                                    <div style="font-weight: 700; color: #1e293b;">관리·시설</div>
                                    <div style="font-size: 0.75rem; color: #64748b;">(80점 이상)</div>
                                </div>
                            </td>
                            <td style="padding: 15px 12px; font-weight: 600; color: #475569;">80점 이상</td>
                            <td id="summaryScoreA" style="padding: 15px 12px; font-weight: 700;">-</td>
                            <td id="summaryNonA" style="padding: 15px 12px; font-weight: 700;">-</td>
                            <td style="padding: 15px 12px;" id="summaryResultA">-</td>
                        </tr>
                        <!-- 소의 상태 행 -->
                        <tr style="border-bottom: 1px solid #edf2f7;">
                            <td style="padding: 15px 12px; text-align: left; display: flex; align-items: center; gap: 10px; justify-content: center;">
                                <div style="display: flex; align-items: center; justify-content: center; width: 32px; height: 32px; border-radius: 50%; background-color: #fef2f2; border: 1px solid #fecaca;">
                                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="20" height="20" fill="none" stroke="#dc2626" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M 33 26 C 30 12, 42 12, 42 26" fill="#ffffff" />
                                        <path d="M 67 26 C 70 12, 58 12, 58 26" fill="#ffffff" />
                                        <path d="M 28 40 C 14 38, 14 50, 28 48" fill="#ffffff" />
                                        <path d="M 72 40 C 86 38, 86 50, 72 48" fill="#ffffff" />
                                        <path d="M 32 32 C 32 22, 68 22, 68 32 C 68 55, 62 65, 50 65 C 38 65, 32 55, 32 32 Z" fill="#ffffff" />
                                        <circle cx="37" cy="36" r="2.5" fill="#dc2626" stroke="none" />
                                        <circle cx="35" cy="43" r="2.2" fill="#dc2626" stroke="none" />
                                        <circle cx="63" cy="36" r="2.5" fill="#dc2626" stroke="none" />
                                        <circle cx="65" cy="43" r="2.2" fill="#dc2626" stroke="none" />
                                        <circle cx="44" cy="40" r="2.5" fill="#dc2626" stroke="none" />
                                        <circle cx="56" cy="40" r="2.5" fill="#dc2626" stroke="none" />
                                        <ellipse cx="50" cy="54" rx="10" ry="6" fill="#ffffff" />
                                        <circle cx="46" cy="54" r="1.5" fill="#dc2626" stroke="none" />
                                        <circle cx="54" cy="54" r="1.5" fill="#dc2626" stroke="none" />
                                    </svg>
                                </div>
                                <div style="text-align: left;">
                                    <div style="font-weight: 700; color: #1e293b;">소의 상태</div>
                                    <div style="font-size: 0.75rem; color: #64748b;">(25점 이상)</div>
                                </div>
                            </td>
                            <td style="padding: 15px 12px; font-weight: 600; color: #475569;">25점 이상</td>
                            <td id="summaryScoreB" style="padding: 15px 12px; font-weight: 700;">-</td>
                            <td id="summaryNonB" style="padding: 15px 12px; font-weight: 700;">-</td>
                            <td style="padding: 15px 12px;" id="summaryResultB">-</td>
                        </tr>
                    </tbody>
                </table>
            </div>
            
            <!-- 최종 예측 결과 요약 카드 -->
            <div id="finalPredictionCard" style="margin-top: 20px; display: flex; align-items: center; gap: 15px; border-radius: 12px; padding: 15px 20px; border: 1.5px solid #feb2b2; background-color: #fff5f5;">
                <div style="font-weight: 800; font-size: 1.1rem; color: #c53030; width: 130px; flex-shrink: 0; border-right: 1.5px solid #feb2b2; padding-right: 15px; text-align: center;">최종 예측 결과</div>
                <div style="display: flex; gap: 12px; align-items: flex-start; flex-grow: 1;">
                    <div id="finalPredictionIcon" style="display: flex; align-items: center; justify-content: center; width: 28px; height: 28px; border-radius: 50%; background-color: #c53030; color: #ffffff; font-weight: bold; flex-shrink: 0;">X</div>
                    <div style="display: flex; flex-direction: column; gap: 3px;">
                        <strong id="finalPredictionTitle" style="font-size: 1.05rem; color: #c53030;">인증 부적합(미달)</strong>
                        <span id="finalPredictionDesc" style="font-size: 0.85rem; color: #9b2c2c;">기준 점수를 충족하지 못한 항목이 있어 인증이 어려울 것으로 예측됩니다.</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- 항목별 세부 내역 -->
        <div class="card" style="padding: 25px; border-radius: 16px; border: 1px solid #e2e8f0; background: #ffffff;">
            <h3 style="margin-top: 0; margin-bottom: 15px; font-size: 1.15rem; color: #0b4c8c; font-weight: 800;">항목별 세부 내역 (상세 진단 결과)</h3>
            <div id="res_details" style="margin-top: 15px;">
                <!-- 상세 내역 삽입 -->
            </div>
        </div>

        <div style="margin-top: 40px; text-align: center;" class="no-print">
            <button class="logout-btn" onclick="window.close()" style="margin-right: 10px; padding: 10px 20px;">닫기</button>
            <button class="btn-primary" onclick="window.print()" style="padding: 10px 20px;"><i class="fas fa-print"></i> 인쇄하기</button>
        </div>
    </div>

    <script>
        const db = window.auth.supabase;

        // 적합 기준 텍스트를 파싱하여 라디오 버튼 옵션 배열로 반환하는 함수
        function parseOptions(criteriaText) {
            if (!criteriaText || criteriaText.trim() === "") {
                return [
                    { value: "Y", label: "Y: 적합" },
                    { value: "N", label: "N: 부적합" }
                ];
            }
            const lines = criteriaText.split('\n');
            const options = [];
            lines.forEach(line => {
                const trimmed = line.trim();
                if (!trimmed) return;
                
                const colonIndex = trimmed.indexOf(':');
                if (colonIndex > 0) {
                    const val = trimmed.substring(0, colonIndex).trim();
                    const desc = trimmed.substring(colonIndex + 1).trim();
                    options.push({ value: val, label: `${val}: ${desc}` });
                } else {
                    options.push({ value: trimmed, label: trimmed });
                }
            });
            return options;
        }

        // 평가항목 정렬 및 비어있는 대/소항목 상속(Forward Fill) 처리 함수
        function sortEvaluationItems(items) {
            if (!items || items.length === 0) return [];

            // 1. 순차 상속을 위해 반드시 id 오름차순으로 1차 정렬한 복사본 생성
            const list = [...items].sort((a, b) => a.id - b.id);

            let lastSection = "";
            let lastLargeItem = "";
            let lastSmallItem = "";

            list.forEach(item => {
                if (item.section) {
                    if (item.section !== lastSection) {
                        lastSection = item.section;
                        lastLargeItem = "";
                        lastSmallItem = "";
                    }
                } else {
                    item.section = lastSection;
                }

                if (item.large_item) {
                    lastLargeItem = item.large_item;
                } else {
                    item.large_item = lastLargeItem;
                }

                if (item.small_item) {
                    lastSmallItem = item.small_item;
                } else {
                    item.small_item = lastSmallItem;
                }
            });

            // 2. 상속이 완료된 데이터를 최종적으로 고유 정렬 번호(sort_order) 순서대로 정렬하여 반환
            return list.sort((a, b) => {
                const orderA = a.sort_order !== undefined && a.sort_order !== null ? a.sort_order : 999999;
                const orderB = b.sort_order !== undefined && b.sort_order !== null ? b.sort_order : 999999;
                if (orderA !== orderB) {
                    return orderA - orderB;
                }
                return a.id - b.id;
            });
        }

        async function loadReport() {
            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('id');
            const type = urlParams.get('type') || 'diagnosis'; // diagnosis or official
            
            if (!id) return alert('잘못된 접근입니다.');

            const tableName = type === 'official' ? 'evaluation_reports' : 'diagnosis_results';
            const { data, error } = await db.from(tableName)
                .select(type === 'official' ? '*, farms(name)' : '*')
                .eq('id', id)
                .single();
            
            if (error) return alert('보고서를 불러오는 데 실패했습니다.');

            document.getElementById('reportDate').innerText = '진단 일시: ' + new Date(data.created_at).toLocaleString();
            
            // 1. 진단 대상 농장 정보 조회 및 바인딩
            let farmInfo = { name: data.user_id || '알수없음', breed: '젖소', scale: '120두', employees: '2명' };
            const userName = (data.user_id === 'farm1') ? '행복농장주' : (data.user_id || '');
            
            if (data.user_id) {
                const { data: matchedFarms } = await db.from('farms')
                    .select('*')
                    .or(`representative.eq."${userName}",representative.eq."${data.user_id}"`);

                if (matchedFarms && matchedFarms.length > 0) {
                    const farm = matchedFarms[0];
                    let remarksData = { employee_count: '', breeding_scale: '' };
                    try {
                        if (farm.remarks && farm.remarks.trim().startsWith('{')) {
                            remarksData = JSON.parse(farm.remarks);
                        }
                    } catch (e) {}
                    
                    farmInfo.name = farm.name || farm.representative;
                    farmInfo.breed = farm.facility_scale || '젖소';
                    farmInfo.scale = remarksData.breeding_scale ? remarksData.breeding_scale + '두' : '120두';
                    farmInfo.employees = remarksData.employee_count ? remarksData.employee_count + '명' : '2명';
                }
            }
            
            document.getElementById('targetFarmName').innerText = farmInfo.name + ' 님';
            document.getElementById('targetFarmBreedScale').innerText = `${farmInfo.breed} / 사육규모: ${farmInfo.scale}`;
            document.getElementById('targetFarmEmployees').innerText = `조직원(고용인) 수: ${farmInfo.employees}`;

            // 2. 종합 점수 및 원형 프로그레스 설정
            const scoreVal = data.score || 0;
            document.getElementById('circleScorePercent').innerText = scoreVal + '%';
            document.getElementById('circleScoreFraction').innerText = `(${scoreVal}점 / 100점)`;

            // SVG DashOffset 설정
            const circle = document.getElementById('scoreProgressCircle');
            if (circle) {
                const circumference = 2 * Math.PI * 50; // 314.16
                const offset = circumference - (circumference * scoreVal / 100);
                circle.style.strokeDashoffset = offset;
            }

            // 점수 수준 등급 설정
            const badge = document.getElementById('scoreLevelBadge');
            if (badge) {
                if (scoreVal === 100) {
                    badge.innerText = '우수 수준';
                    badge.style.backgroundColor = '#d1fae5';
                    badge.style.color = '#065f46';
                } else if (scoreVal >= 80) {
                    badge.innerText = '우수 수준';
                    badge.style.backgroundColor = '#d1fae5';
                    badge.style.color = '#065f46';
                } else if (scoreVal >= 50) {
                    badge.innerText = '보통 수준';
                    badge.style.backgroundColor = '#fef3c7';
                    badge.style.color = '#d97706';
                } else {
                    badge.innerText = '미흡 수준';
                    badge.style.backgroundColor = '#fee2e2';
                    badge.style.color = '#991b1b';
                }
            }

            // 3. 종합 의견 메세지 설정
            let message = '';
            if (type === 'official') {
                message = data.summary || '종합 의견이 없습니다.';
            } else {
                if (scoreVal === 100) message = '축하합니다! 모든 동물복지 기준을 충족하고 있습니다. 지금 바로 인증 신청을 고려해 보세요.';
                else if (scoreVal >= 80) message = '아주 훌륭한 복지 수준입니다. 부적합 항목을 보완하시면 충분히 인증을 획득할 수 있습니다.';
                else if (scoreVal >= 50) message = '보통 수준의 복지 환경입니다. 일부 항목의 개선이 필요합니다.';
                else message = '동물복지 수준 개선이 시급합니다. 전문가의 컨설팅을 받아보시는 것을 추천합니다.';
            }
            document.getElementById('res_comment').innerText = message;

            // 4. 상세 내역 매핑을 위해 평가항목 다시 로드
            const { data: rawItems } = await db.from('evaluation_items').select('id, large_item, small_item, standard, compliance_criteria, section').order('id', { ascending: true });
            
            // 섹션 설정 로드 및 비활성 필터링
            const { data: configs, error: configError } = await db.from('section_configs').select('*');
            const inactiveKeywords = configError ? [] : configs.filter(c => !c.is_active).map(c => c.section_name);
            const cleanSect = s => s.replace(/[^가-힣a-zA-Z0-9]/g, '');

            const filteredItems = rawItems.filter(item => {
                const itemSectClean = cleanSect(item.section || "");
                return !inactiveKeywords.some(keyword => itemSectClean.includes(keyword));
            });

            const items = sortEvaluationItems(filteredItems);
            
            const itemMap = items.reduce((acc, item) => {
                acc[item.id] = item;
                return acc;
            }, {});

            let details = data.details || {};
            if (typeof details === 'string') {
                try {
                    details = JSON.parse(details);
                } catch (e) {
                    console.error('details JSON 파싱 실패:', e);
                    details = {};
                }
            }

            let normalizedDetails = [];
            if (Array.isArray(details)) {
                normalizedDetails = details;
            } else {
                const sortedDetailKeys = Object.keys(details).map(k => parseInt(k)).sort((a, b) => a - b);
                normalizedDetails = sortedDetailKeys.map(key => {
                    const itemDetail = details[key];
                    const isObj = (itemDetail !== null && typeof itemDetail === 'object');
                    return {
                        orig_id: parseInt(key),
                        status: isObj ? itemDetail.status : itemDetail,
                        comment: isObj ? (itemDetail.comment || '') : '',
                        measurements: isObj ? (itemDetail.measurements || []) : [],
                        cow_conditions: isObj ? (itemDetail.cow_conditions || null) : null,
                        large_item: isObj ? (itemDetail.large_item || '') : '',
                        small_item: isObj ? (itemDetail.small_item || '') : '',
                        standard: isObj ? (itemDetail.standard || '') : '',
                        compliance_criteria: isObj ? (itemDetail.compliance_criteria || '') : ''
                    };
                });
            }

            const sortedIds = items.map(it => it.id);
            normalizedDetails.sort((a, b) => {
                const idxA = sortedIds.indexOf(a.orig_id);
                const idxB = sortedIds.indexOf(b.orig_id);
                return (idxA === -1 ? 999 : idxA) - (idxB === -1 ? 999 : idxB);
            });

            // 5. 주요 진단결과 요약 데이터 계산 (관리·시설 A그룹, 소의 상태 B그룹)
            let groupA_earned = 0;
            let groupA_max = 0;
            let groupB_earned = 0;
            let groupB_max = 0;
            let groupA_nonCompliant = 0;
            let groupB_nonCompliant = 0;
            let nonCompliantYNCount = 0;

            normalizedDetails.forEach(itemDetail => {
                const key = itemDetail.orig_id;
                const status = itemDetail.status;
                const item = itemMap[key];
                
                if (!item || !status || status === 'N/A' || status === 'NA') return;

                const options = parseOptions(item.compliance_criteria);
                const numericValues = options.map(o => parseFloat(o.value)).filter(v => !isNaN(v));

                const isGroupA = [
                    '□ 일반기준',
                    '□ 사양관리 방법',
                    '□ 사육시설 및 환경',
                    '□ 동물복지형 자유방목(추가 사항)',
                    '□ 동물복지형 자유방목 (추가사항)'
                ].includes(item.section);

                const isGroupB = (item.section === '□ 소의 상태 평가');

                let earnedVal = 0;
                let maxVal = 0;

                if (numericValues.length > 0) {
                    maxVal = Math.max(...numericValues);
                    earnedVal = parseFloat(status);
                    if (isNaN(earnedVal)) earnedVal = 0;

                    if (isGroupA) {
                        groupA_earned += earnedVal;
                        groupA_max += maxVal;
                        if (earnedVal !== maxVal) groupA_nonCompliant++;
                    } else if (isGroupB) {
                        groupB_earned += earnedVal;
                        groupB_max += maxVal;
                        if (earnedVal !== maxVal) groupB_nonCompliant++;
                    }
                } else {
                    maxVal = 1;
                    earnedVal = (status === 'Y') ? 1 : 0;

                    if (isGroupA) {
                        groupA_earned += earnedVal;
                        groupA_max += maxVal;
                        if (status !== 'Y') groupA_nonCompliant++;
                    } else if (isGroupB) {
                        groupB_earned += earnedVal;
                        groupB_max += maxVal;
                        if (status !== 'Y') groupB_nonCompliant++;
                    }

                    // 필수 Y/N 문항 과락 여부
                    if (status === 'N') {
                        nonCompliantYNCount++;
                    }
                }
            });

            const scoreA = groupA_max > 0 ? Math.round((groupA_earned / groupA_max) * 100) : 0;
            const scoreB = groupB_max > 0 ? Math.round((groupB_earned / groupB_max) * 100) : 0;

            const isGroupAPass = scoreA >= 80;
            const isGroupBPass = scoreB >= 25;
            const isYNPass = nonCompliantYNCount === 0;
            const finalPassed = isGroupAPass && isGroupBPass && isYNPass;

            // 요약 테이블 바인딩
            // 관리·시설 (A그룹)
            const sumScoreA = document.getElementById('summaryScoreA');
            sumScoreA.innerText = `${scoreA}점`;
            sumScoreA.style.color = isGroupAPass ? '#2c7a7b' : '#c53030';
            
            const sumNonA = document.getElementById('summaryNonA');
            sumNonA.innerText = `${groupA_nonCompliant}개`;
            sumNonA.style.color = groupA_nonCompliant > 0 ? '#c53030' : '#2c7a7b';
            
            const sumResA = document.getElementById('summaryResultA');
            sumResA.innerHTML = isGroupAPass 
                ? `<span style="border: 1px solid #bbf7d0; background-color: #f0fdf4; color: #16a34a; padding: 4px 10px; border-radius: 20px; font-weight: 700; font-size: 0.8rem;">통과</span>`
                : `<span style="border: 1px solid #fecaca; background-color: #fef2f2; color: #dc2626; padding: 4px 10px; border-radius: 20px; font-weight: 700; font-size: 0.8rem;">미달</span>`;

            // 소의 상태 (B그룹)
            const sumScoreB = document.getElementById('summaryScoreB');
            sumScoreB.innerText = `${scoreB}점`;
            sumScoreB.style.color = isGroupBPass ? '#2c7a7b' : '#c53030';
            
            const sumNonB = document.getElementById('summaryNonB');
            sumNonB.innerText = `${groupB_nonCompliant}개`;
            sumNonB.style.color = groupB_nonCompliant > 0 ? '#c53030' : '#2c7a7b';
            
            const sumResB = document.getElementById('summaryResultB');
            sumResB.innerHTML = isGroupBPass 
                ? `<span style="border: 1px solid #bbf7d0; background-color: #f0fdf4; color: #16a34a; padding: 4px 10px; border-radius: 20px; font-weight: 700; font-size: 0.8rem;">통과</span>`
                : `<span style="border: 1px solid #fecaca; background-color: #fef2f2; color: #dc2626; padding: 4px 10px; border-radius: 20px; font-weight: 700; font-size: 0.8rem;">미달</span>`;

            // 6. 최종 예측 결과 카드 바인딩
            const predCard = document.getElementById('finalPredictionCard');
            const predIcon = document.getElementById('finalPredictionIcon');
            const predTitle = document.getElementById('finalPredictionTitle');
            const predDesc = document.getElementById('finalPredictionDesc');

            if (finalPassed) {
                predCard.style.borderColor = '#bbf7d0';
                predCard.style.backgroundColor = '#f0fdf4';
                
                predIcon.innerText = '✓';
                predIcon.style.backgroundColor = '#16a34a';
                
                predTitle.innerText = '인증 적합(통과)';
                predTitle.style.color = '#16a34a';
                
                predDesc.innerText = '모든 기준 점수를 충족하여 인증 획득이 가능할 것으로 예측됩니다.';
                predDesc.style.color = '#15803d';
            } else {
                predCard.style.borderColor = '#fecaca';
                predCard.style.backgroundColor = '#fef2f2';
                
                predIcon.innerText = 'X';
                predIcon.style.backgroundColor = '#dc2626';
                
                predTitle.innerText = '인증 부적합(미달)';
                predTitle.style.color = '#dc2626';
                
                let descText = '기준 점수를 충족하지 못한 항목이 있어 인증이 어려울 것으로 예측됩니다.';
                if (!isYNPass) {
                    descText = '필수 적부(Y/N) 부적합 항목이 있어 인증이 어려울 것으로 예측됩니다.';
                }
                predDesc.innerText = descText;
                predDesc.style.color = '#991b1b';
            }

            // 적합/부적합 통계 텍스트 업데이트 (불필요한 엘리먼트 에러 방지 처리)
            const resY = document.getElementById('res_y');
            const resN = document.getElementById('res_n');
            if (resY) resY.innerText = compliantCount;
            if (resN) resN.innerText = nonCompliantCount;

            const detailContainer = document.getElementById('res_details');
            detailContainer.innerHTML = normalizedDetails.map((itemDetail, index) => {
                let status = 'NA';
                let comment = '';
                
                let evalItem = null;
                const key = (itemDetail && itemDetail.orig_id !== undefined && itemDetail.orig_id !== null) ? itemDetail.orig_id : index;
                
                if (type === 'official') {
                    status = itemDetail ? itemDetail.status : 'NA';
                    comment = itemDetail ? itemDetail.comment : '';
                    
                    if (itemDetail && itemDetail.standard !== undefined && itemDetail.standard !== null && String(itemDetail.standard).trim() !== '') {
                        evalItem = {
                            large_item: itemDetail.large_item || '미확인 대항목',
                            small_item: itemDetail.small_item || '',
                            standard: itemDetail.standard,
                            compliance_criteria: itemDetail.compliance_criteria || ''
                        };
                    }
                } else {
                    status = itemDetail ? itemDetail.status : 'N';
                }

                if (status === 'NA' || status === 'N/A') return ''; // 공식 평가에서 NA는 제외
                
                if (!evalItem) {
                    if (itemMap[key]) {
                        evalItem = itemMap[key];
                    } else {
                        if (items && items[index]) {
                            evalItem = items[index];
                        } else {
                            evalItem = {
                                large_item: '미확인 대항목',
                                small_item: '',
                                standard: '미확인 문항 (ID: ' + key + ')',
                                compliance_criteria: ''
                            };
                        }
                    }
                }

                const options = parseOptions(evalItem.compliance_criteria);
                const matchedOption = options.find(o => o.value === status);
                const statusText = matchedOption ? matchedOption.label : status;
                
                const numericValues = options.map(o => parseFloat(o.value)).filter(v => !isNaN(v));
                const maxVal = numericValues.length > 0 ? Math.max(...numericValues) : 1;

                let isCompliant = false;
                if (numericValues.length > 0) {
                    isCompliant = parseFloat(status) === maxVal;
                } else {
                    isCompliant = status === 'Y';
                }

                let statusClass = isCompliant ? 'status-y' : 'status-n';

                return `
                    <div class="detail-item" style="flex-direction: column; align-items: flex-start;">
                        <div style="display: flex; justify-content: space-between; width: 100%; align-items: center;">
                            <div style="flex: 1; padding-right: 15px;">
                                <div style="font-weight: 600; font-size: 0.9rem;">[${evalItem.large_item || '-'}] ${evalItem.small_item ? evalItem.small_item : ''}</div>
                                <div style="font-size: 0.8rem; color: #666; margin-top: 2px;">${evalItem.standard}</div>
                            </div>
                            <div class="${statusClass}" style="font-size: 0.9rem; text-align: right; min-width: 120px; white-space: normal;">
                                ${statusText}
                            </div>
                        </div>
                        ${comment ? `<div style="font-size: 0.8rem; background: #fff5f5; padding: 5px 10px; border-radius: 4px; margin-top: 5px; width: 100%;">의견: ${comment}</div>` : ''}
                    </div>
                `;
            }).join('');
        }

        loadReport();
    </script>
</body>
</html>
