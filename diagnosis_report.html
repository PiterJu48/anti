<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>자가 진단 결과 보고서 | 동물복지인증 평가 시스템</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="auth.js"></script>
    <style>
        .report-container {
            max-width: 900px;
            margin: 40px auto;
            padding: 40px;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        .report-header {
            text-align: center;
            border-bottom: 2px solid var(--primary-color);
            padding-bottom: 20px;
            margin-bottom: 30px;
        }
        .score-circle {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: var(--primary-color);
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }
        .score-value {
            font-size: 2.5rem;
            font-weight: 800;
        }
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }
        .info-item {
            background: #f8fafc;
            padding: 15px;
            border-radius: 8px;
        }
        .detail-item {
            padding: 15px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .status-y { color: #2c7a7b; font-weight: 700; }
        .status-n { color: #c53030; font-weight: 700; }
        @media print {
            .no-print { display: none; }
            .report-container { box-shadow: none; margin: 0; padding: 20px; }
        }
        @media (max-width: 768px) {
            .report-container { margin: 20px; padding: 20px; }
            .info-grid { grid-template-columns: 1fr; }
            .score-circle { width: 120px; height: 120px; }
            .score-value { font-size: 2rem; }
        }
    </style>
</head>
<body>
    <div class="report-container">
        <div class="report-header">
            <h1>동물복지 자가 진단 결과 보고서</h1>
            <p id="reportDate" style="color: #666; margin-top: 10px;"></p>
        </div>

        <div class="score-circle">
            <div class="score-value" id="res_score">0%</div>
            <div style="font-size: 0.9rem;">종합 점수</div>
        </div>

        <div class="info-grid">
            <div class="info-item">
                <p style="color: #666; font-size: 0.8rem;">진단 대상</p>
                <p id="res_user" style="font-weight: 700; font-size: 1.1rem;">-</p>
            </div>
            <div class="info-item">
                <p style="color: #666; font-size: 0.8rem;">항목별 현황</p>
                <p style="font-weight: 700; font-size: 1.1rem;">
                    적합: <span id="res_y" class="status-y">0</span> / 
                    부적합: <span id="res_n" class="status-n">0</span>
                </p>
            </div>
        </div>

        <div class="card" style="margin-bottom: 30px;">
            <h3><i class="fas fa-comment-dots"></i> 종합 의견</h3>
            <p id="res_comment" style="line-height: 1.6; margin-top: 10px;"></p>
        </div>

        <div class="card">
            <h3><i class="fas fa-list-check"></i> 상세 진단 내역</h3>
            <div id="res_details" style="margin-top: 15px;">
                <!-- 상세 내역 삽입 -->
            </div>
        </div>

        <div style="margin-top: 40px; text-align: center;" class="no-print">
            <button class="logout-btn" onclick="window.close()" style="margin-right: 10px;">닫기</button>
            <button class="btn-primary" onclick="window.print()"><i class="fas fa-print"></i> 인쇄하기</button>
        </div>
    </div>

    <script>
        const db = window.auth.supabase;

        // 적합 기준 텍스트를 파싱하여 라디오 버튼 옵션 배열로 반환하는 함수
        function parseOptions(criteriaText) {
            if (!criteriaText || criteriaText.trim() === "") {
                return [
                    { value: "Y", label: "Y: 적합" },
                    { value: "N", label: "N: 부적합" }
                ];
            }
            const lines = criteriaText.split('\n');
            const options = [];
            lines.forEach(line => {
                const trimmed = line.trim();
                if (!trimmed) return;
                
                const colonIndex = trimmed.indexOf(':');
                if (colonIndex > 0) {
                    const val = trimmed.substring(0, colonIndex).trim();
                    const desc = trimmed.substring(colonIndex + 1).trim();
                    options.push({ value: val, label: `${val}: ${desc}` });
                } else {
                    options.push({ value: trimmed, label: trimmed });
                }
            });
            return options;
        }

        async function loadReport() {
            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('id');
            const type = urlParams.get('type') || 'diagnosis'; // diagnosis or official
            
            if (!id) return alert('잘못된 접근입니다.');

            const tableName = type === 'official' ? 'evaluation_reports' : 'diagnosis_results';
            const { data, error } = await db.from(tableName)
                .select(type === 'official' ? '*, farms(name)' : '*')
                .eq('id', id)
                .single();
            
            if (error) return alert('보고서를 불러오는 데 실패했습니다.');

            document.getElementById('reportDate').innerText = '진단 일시: ' + new Date(data.created_at).toLocaleString();
            document.getElementById('res_score').innerText = data.score + '%';
            
            if (type === 'official') {
                document.getElementById('res_user').innerText = data.farms ? data.farms.name : '알수없음';
                document.getElementById('res_comment').innerText = data.summary || '종합 의견이 없습니다.';
            } else {
                document.getElementById('res_user').innerText = data.user_id + ' 님';
                
                let message = '';
                if (data.score === 100) message = '축하합니다! 모든 동물복지 기준을 충족하고 있습니다. 지금 바로 인증 신청을 고려해 보세요.';
                else if (data.score >= 80) message = '아주 훌륭한 복지 수준입니다. 부적합 항목을 보완하시면 충분히 인증을 획득할 수 있습니다.';
                else if (data.score >= 50) message = '보통 수준의 복지 환경입니다. 일부 항목의 개선이 필요합니다.';
                else message = '동물복지 수준 개선이 시급합니다. 전문가의 컨설팅을 받아보시는 것을 추천합니다.';
                document.getElementById('res_comment').innerText = message;
            }

            // 상세 내역 매핑을 위해 평가항목 다시 로드
            const { data: items } = await db.from('evaluation_items').select('id, large_item, small_item, standard, compliance_criteria').order('id', { ascending: true });
            
            const itemMap = items.reduce((acc, item) => {
                acc[item.id] = item;
                return acc;
            }, {});

            // details가 JSON 문자열일 경우 안전하게 객체/배열로 파싱
            let details = data.details || {};
            if (typeof details === 'string') {
                try {
                    details = JSON.parse(details);
                } catch (e) {
                    console.error('details JSON 파싱 실패:', e);
                    details = {};
                }
            }

            // details가 배열인지 객체인지 판별하여 정규화된 배열 구조 생성
            let normalizedDetails = [];
            if (Array.isArray(details)) {
                normalizedDetails = details;
            } else {
                const sortedDetailKeys = Object.keys(details).map(k => parseInt(k)).sort((a, b) => a - b);
                normalizedDetails = sortedDetailKeys.map(key => {
                    const itemDetail = details[key];
                    return {
                        orig_id: parseInt(key),
                        status: itemDetail.status,
                        comment: itemDetail.comment || '',
                        measurements: itemDetail.measurements || [],
                        cow_conditions: itemDetail.cow_conditions || null,
                        large_item: itemDetail.large_item || '',
                        small_item: itemDetail.small_item || '',
                        standard: itemDetail.standard || '',
                        compliance_criteria: itemDetail.compliance_criteria || ''
                    };
                });
            }

            // 적합/부적합 통계 계산
            let compliantCount = 0;
            let nonCompliantCount = 0;

            if (type === 'official') {
                normalizedDetails.forEach((val) => {
                    if (val.status === 'NA' || val.status === 'N/A' || val.status === null) return;
                    
                    const compCriteria = val.compliance_criteria || '';
                    const options = parseOptions(compCriteria);
                    const numericValues = options.map(o => parseFloat(o.value)).filter(v => !isNaN(v));
                    
                    if (numericValues.length > 0) {
                        // 점수형 문항의 경우 최고점이면 적합, 아니면 부적합으로 요약 통계 처리
                        const maxVal = Math.max(...numericValues);
                        const earnedVal = parseFloat(val.status);
                        if (!isNaN(earnedVal) && earnedVal === maxVal) {
                            compliantCount++;
                        } else {
                            nonCompliantCount++;
                        }
                    } else {
                        if (val.status === 'Y') compliantCount++;
                        else if (val.status === 'N') nonCompliantCount++;
                    }
                });
            } else {
                compliantCount = data.compliant_count;
                nonCompliantCount = data.non_compliant_count;
            }

            document.getElementById('res_y').innerText = compliantCount;
            document.getElementById('res_n').innerText = nonCompliantCount;

            const detailContainer = document.getElementById('res_details');
            detailContainer.innerHTML = normalizedDetails.map((itemDetail, index) => {
                let status = 'NA';
                let comment = '';
                
                let evalItem = null;
                const key = (itemDetail && itemDetail.orig_id !== undefined && itemDetail.orig_id !== null) ? itemDetail.orig_id : index;
                
                if (type === 'official') {
                    status = itemDetail ? itemDetail.status : 'NA';
                    comment = itemDetail ? itemDetail.comment : '';
                    
                    if (itemDetail && itemDetail.standard !== undefined && itemDetail.standard !== null && String(itemDetail.standard).trim() !== '') {
                        evalItem = {
                            large_item: itemDetail.large_item || '미확인 대항목',
                            small_item: itemDetail.small_item || '',
                            standard: itemDetail.standard,
                            compliance_criteria: itemDetail.compliance_criteria || ''
                        };
                    }
                } else {
                    status = itemDetail || 'N';
                }

                if (status === 'NA' || status === 'N/A') return ''; // 공식 평가에서 NA는 제외
                
                if (!evalItem) {
                    if (itemMap[key]) {
                        evalItem = itemMap[key];
                    } else {
                        if (items && items[index]) {
                            evalItem = items[index];
                        } else {
                            evalItem = {
                                large_item: '미확인 대항목',
                                small_item: '',
                                standard: '미확인 문항 (ID: ' + key + ')',
                                compliance_criteria: ''
                            };
                        }
                    }
                }

                const options = parseOptions(evalItem.compliance_criteria);
                const matchedOption = options.find(o => o.value === status);
                const statusText = matchedOption ? matchedOption.label : status;
                
                let statusClass = 'status-n';
                if (status === 'Y' || (status !== 'N' && !isNaN(parseFloat(status)) && parseFloat(status) > 0)) {
                    statusClass = 'status-y';
                }

                return `
                    <div class="detail-item" style="flex-direction: column; align-items: flex-start;">
                        <div style="display: flex; justify-content: space-between; width: 100%; align-items: center;">
                            <div style="flex: 1; padding-right: 15px;">
                                <div style="font-weight: 600; font-size: 0.9rem;">[${evalItem.large_item || '-'}] ${evalItem.small_item ? evalItem.small_item : ''}</div>
                                <div style="font-size: 0.8rem; color: #666; margin-top: 2px;">${evalItem.standard}</div>
                            </div>
                            <div class="${statusClass}" style="font-size: 0.9rem; text-align: right; min-width: 120px; white-space: normal;">
                                ${statusText}
                            </div>
                        </div>
                        ${comment ? `<div style="font-size: 0.8rem; background: #fff5f5; padding: 5px 10px; border-radius: 4px; margin-top: 5px; width: 100%;">의견: ${comment}</div>` : ''}
                    </div>
                `;
            }).join('');
        }

        loadReport();
    </script>
</body>
</html>
