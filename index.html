<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>동물복지인증 평가 시스템 | 로그인</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="favicon.png">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="auth.js"></script>
</head>
<body>
    <div class="login-container">
        <div class="login-box" style="margin: 20px;">
            <!-- 농림축산식품부 스타일의 아이콘 (임시) -->
            <div style="font-size: 50px; margin-bottom: 10px;">🏛️</div>
            <h1>동물복지인증 평가 시스템</h1>
            <p>본 시스템은 관계자 외 사용을 금합니다.</p>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="userId">아이디</label>
                    <input type="text" id="userId" placeholder="아이디를 입력하세요" required>
                </div>
                <div class="form-group">
                    <label for="password">비밀번호</label>
                    <input type="password" id="password" placeholder="비밀번호를 입력하세요" required>
                </div>
                <button type="submit" class="login-btn">로그인</button>
            </form>
            
            <div id="errorMessage" style="color: red; margin-top: 15px; font-size: 0.85rem; display: none;">
                로그인 정보가 올바르지 않습니다.
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const userId = document.getElementById('userId').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMessage');

            try {
                const role = await window.auth.login(userId, password);
                
                // 역할에 따라 리다이렉트
                if (role === 'admin') window.location.href = 'admin.html';
                else if (role === 'evaluator') window.location.href = 'evaluator.html';
                else window.location.href = 'farm.html';
                
            } catch (error) {
                console.error('Login error:', error);
                errorMsg.style.display = 'block';
                errorMsg.innerText = '로그인 실패: ' + (error.message || '정보를 확인하세요.');
            }
        });
    </script>
</body>
</html>
